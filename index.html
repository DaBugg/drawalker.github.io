<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0f172a; }
#root { width: 100%; height: 100%; }
::-webkit-scrollbar { display: none; }
/* Keep zoom shell behind NavCards; site stylesheet sets body for marketing pages */
body { background: #0f172a !important; }

/* Scroll region below NavCards header — header row is separate; art lives here only */
.portfolio-panel-body {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
  background-color: #0b1220;
  background-image: none;
  background-repeat: no-repeat;
}
/* Four-tile home grid: dark shell; tile art comes from .pf-nav-grid-tile--* */
.portfolio-panel-body--grid {
  background-color: #0b1220;
  background-image: none;
}
.portfolio-panel-body--about {
  background-color: #0b1220;
  /*
    Paint on the scroll container itself so it spans the entire About content
    (bio + Spotify + quote/book), not just the visible viewport.
  */
  background-image:
    linear-gradient(rgba(11, 18, 32, 0.42), rgba(11, 18, 32, 0.5)),
    url('test-pages-new/services.svg');
  background-repeat: no-repeat, no-repeat;
  background-position: center center, center center;
  background-size: cover, cover;
  background-attachment: local;
  flex: 1 1 auto;
  min-height: 100%;
  width: 100%;
}
/* Let illustration show through (global .section--soft is opaque) */
.portfolio-panel-body--about .section.section--soft {
  background: transparent !important;
  border-top: 1px solid rgba(148, 163, 184, 0.22);
  border-bottom: 1px solid rgba(148, 163, 184, 0.22);
}
.portfolio-panel-body--work {
  background-image: url('test-pages-new/work-background.svg');
  background-position: center center;
  background-size: cover;
}
.portfolio-panel-body--services {
  background-color: #0b1220;
  background-image:
    linear-gradient(rgba(11, 18, 32, 0.52), rgba(11, 18, 32, 0.56)),
    url('test-pages-new/about-background.svg');
  background-repeat: repeat-y;
  background-position: center top;
  background-size: 100% auto;
  background-attachment: local;
}
.portfolio-panel-body--contact {
  background-color: #e9eef6;
  background-image: url('test-pages-new/Contact-background.svg');
  background-repeat: no-repeat;
  background-position: center bottom;
  background-size: min(100%, 1600px) auto;
}
@media (min-width: 900px) {
  .portfolio-panel-body--services {
    background-size: cover;
  }
  .portfolio-panel-body--contact {
    background-size: min(100%, 2000px) auto;
  }
}

/* Four section tiles (grid): same SVG art as full sections, dark-friendly read */
.pf-nav-grid-tile {
  background-repeat: no-repeat;
  background-color: #0b1220;
  background-size: cover;
  background-position: center;
}
.pf-nav-grid-tile--about {
  background-image:
    linear-gradient(rgba(11, 18, 32, 0.42), rgba(11, 18, 32, 0.5)),
    url('test-pages-new/services.svg');
  background-repeat: no-repeat, no-repeat;
  background-size: cover, cover;
  background-position: center, center;
}
.pf-nav-grid-tile--work {
  background-image:
    linear-gradient(rgba(11, 18, 32, 0.72), rgba(11, 18, 32, 0.72)),
    url('test-pages-new/work-background.svg');
}
.pf-nav-grid-tile--services {
  background-image:
    linear-gradient(rgba(11, 18, 32, 0.52), rgba(11, 18, 32, 0.56)),
    url('test-pages-new/about-background.svg');
}
.pf-nav-grid-tile--contact {
  background-color: #e9eef6;
  background-image:
    linear-gradient(rgba(11, 18, 32, 0.68), rgba(11, 18, 32, 0.68)),
    url('test-pages-new/Contact-background.svg');
  background-repeat: no-repeat, no-repeat;
  background-position: center bottom, center bottom;
  background-size: min(100%, 1600px) auto, min(100%, 1600px) auto;
}
@media (min-width: 900px) {
  .pf-nav-grid-tile--contact {
    background-size: min(100%, 2000px) auto, min(100%, 2000px) auto;
  }
}
.pf-nav-grid-tile__num {
  color: rgba(255, 255, 255, 0.1);
}
.pf-nav-grid-tile__title {
  color: rgba(252, 252, 254, 0.96);
  font-size: clamp(1.05rem, 2.8vw, 2.1rem);
  font-weight: 300;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.pf-nav-grid-tile__sub {
  color: #f87171;
  font-size: clamp(0.8rem, 1.15vw, 0.95rem);
  font-weight: 500;
  letter-spacing: 0.06em;
}
.pf-nav-grid-tile:hover {
  filter: brightness(1.07);
}
.pf-nav-grid-tile:focus-visible {
  outline: 2px solid rgba(52, 211, 153, 0.55);
  outline-offset: -3px;
}

/* Light island inside portfolio (contact): consultation form uses marketing tokens */
.portfolio-embed-root[data-theme="light"] {
  color-scheme: light;
  --bg: #f8fafc;
  --bg-soft: #f1f5f9;
  --surface: #ffffff;
  --surface-border: #e5e7eb;
  --text: #0f172a;
  --text-muted: #475569;
  --accent: #16a34a;
  --accent-strong: #15803d;
  --link: #1d4ed8;
  --accent-cyan: #0891b2;
  --accent-emerald: #059669;
  --accent-blue: #2563eb;
  --shadow: 0 6px 20px rgba(15, 23, 42, 0.1);
  color: var(--text);
}
.pf-contact-embed .section {
  padding-top: 1.75rem;
  padding-bottom: 2.5rem;
}
.pf-contact-embed .title {
  color: var(--text);
}

/* Portfolio contact — three-step journey */
.pf-contact-journey {
  max-width: 54rem;
}
.pf-contact-step {
  border-radius: 1.15rem;
  border: 1px solid rgba(15, 23, 42, 0.08);
  background: linear-gradient(
    165deg,
    rgba(255, 255, 255, 0.98) 0%,
    color-mix(in oklab, var(--bg-soft) 88%, white) 55%,
    rgba(255, 255, 255, 0.94) 100%
  );
  box-shadow:
    0 1px 2px rgba(15, 23, 42, 0.04),
    0 18px 40px -16px rgba(15, 23, 42, 0.14);
  padding: clamp(1.2rem, 3vw, 1.85rem);
}
.pf-contact-step__progress {
  display: block;
  margin: 0 0 0.95rem;
  font-family: "JetBrains Mono", monospace;
  font-size: 0.72rem;
  letter-spacing: 0.08em;
  color: #64748b;
}
.pf-contact-step__header {
  margin-bottom: 1.35rem;
}
.pf-contact-step__eyebrow {
  font-family: "DM Sans", var(--font-sans), system-ui, sans-serif;
  font-size: 0.72rem;
  font-weight: 600;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  color: #64748b;
  margin: 0 0 0.45rem;
}
.pf-contact-step__title {
  margin: 0;
  font-family: "Instrument Serif", Georgia, serif;
  font-weight: 400;
  line-height: 1.12;
  font-size: clamp(2rem, 5vw, 2.8rem);
  color: #0f172a;
}
.pf-contact-title-accent {
  color: #c9ae7a;
  font-style: italic;
}
.pf-contact-step__back {
  appearance: none;
  border: 1px solid rgba(15, 23, 42, 0.18);
  background: #fff;
  color: #1e293b;
  border-radius: 0.65rem;
  padding: 0.45rem 0.75rem;
  font-family: "DM Sans", var(--font-sans), system-ui, sans-serif;
  font-weight: 600;
  font-size: 0.82rem;
  margin-bottom: 0.9rem;
  cursor: pointer;
}
.pf-contact-step__back:focus-visible {
  outline: none;
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent-blue) 24%, transparent);
}
.pf-contact-step__heading {
  margin: 0 0 0.45rem;
  font-family: "DM Sans", var(--font-sans), system-ui, sans-serif;
  font-size: 1.15rem;
  font-weight: 600;
  color: #0f172a;
}
.pf-contact-step__helper {
  margin: 0 0 1rem;
  font-family: "DM Sans", var(--font-sans), system-ui, sans-serif;
  font-size: 0.94rem;
  color: #334155;
  line-height: 1.65;
}
.pf-contact-tiles {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0.7rem;
}
@media (min-width: 768px) {
  .pf-contact-tiles {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}
.pf-contact-tile {
  text-align: left;
  border: 1px solid rgba(15, 23, 42, 0.11);
  background: #fff;
  border-radius: 0.8rem;
  padding: 0.8rem 0.9rem;
  cursor: pointer;
  transition: border-color 0.16s ease, box-shadow 0.16s ease, transform 0.12s ease;
}
.pf-contact-tile:hover {
  border-color: color-mix(in oklab, var(--accent-cyan) 55%, var(--surface-border));
  box-shadow: 0 4px 16px -12px rgba(2, 132, 199, 0.45);
}
.pf-contact-tile:focus-visible {
  outline: none;
  border-color: var(--accent-cyan);
  box-shadow: 0 0 0 3px color-mix(in oklab, var(--accent-cyan) 28%, transparent);
}
.pf-contact-tile--selected {
  border-color: var(--accent-cyan);
  background: color-mix(in oklab, var(--accent-cyan) 10%, white);
  box-shadow: 0 0 0 1px color-mix(in oklab, var(--accent-cyan) 26%, transparent);
}
.pf-contact-tile__label {
  display: block;
  margin-bottom: 0.15rem;
  font-family: "DM Sans", var(--font-sans), system-ui, sans-serif;
  font-size: 0.92rem;
  font-weight: 600;
  color: #0f172a;
}
.pf-contact-tile__desc {
  margin: 0;
  font-family: "DM Sans", var(--font-sans), system-ui, sans-serif;
  font-size: 0.84rem;
  line-height: 1.5;
  color: #475569;
}
.pf-contact-summary-chip {
  display: flex;
  flex-wrap: wrap;
  gap: 0.55rem 0.8rem;
  align-items: center;
  margin: 0 0 1rem;
  padding: 0.65rem 0.75rem;
  border-radius: 0.75rem;
  border: 1px solid rgba(15, 23, 42, 0.08);
  background: color-mix(in oklab, var(--bg-soft) 75%, white);
  font-family: "DM Sans", var(--font-sans), system-ui, sans-serif;
  font-size: 0.84rem;
  color: #334155;
}
.pf-contact-summary-chip__edit {
  appearance: none;
  border: none;
  background: none;
  color: #1d4ed8;
  font-size: 0.82rem;
  font-weight: 600;
  padding: 0;
  cursor: pointer;
}
.pf-contact-summary-chip__edit:focus-visible {
  outline: 2px solid rgba(29, 78, 216, 0.45);
  outline-offset: 2px;
  border-radius: 0.2rem;
}
.pf-contact-form {
  display: grid;
  gap: 0.9rem;
}
.pf-contact-form__field {
  display: grid;
  gap: 0.35rem;
}
.pf-contact-form__field label {
  font-family: "DM Sans", var(--font-sans), system-ui, sans-serif;
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: #334155;
}
.pf-contact-form__field small {
  font-family: "DM Sans", var(--font-sans), system-ui, sans-serif;
  font-size: 0.76rem;
  color: #64748b;
}
.pf-contact-form__field input,
.pf-contact-form__field select,
.pf-contact-form__field textarea {
  border-radius: 0.65rem;
  border: 1px solid rgba(15, 23, 42, 0.1);
  background: #fff;
  box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.03);
  padding: 0.6rem 0.72rem;
  font-family: "DM Sans", var(--font-sans), system-ui, sans-serif;
  font-size: 0.92rem;
  color: #0f172a;
}
.pf-contact-form__field input:focus,
.pf-contact-form__field select:focus,
.pf-contact-form__field textarea:focus {
  outline: none;
  border-color: var(--accent-cyan);
  box-shadow:
    inset 0 1px 2px rgba(15, 23, 42, 0.03),
    0 0 0 3px color-mix(in oklab, var(--accent-cyan) 22%, transparent);
}
.pf-contact-form__submit {
  width: 100%;
}
.pf-contact-form__status {
  margin: 0;
  font-family: "DM Sans", var(--font-sans), system-ui, sans-serif;
  font-size: 0.82rem;
  color: #b91c1c;
}
.pf-contact-form__fallback {
  margin: 0.2rem 0 0;
  font-family: "DM Sans", var(--font-sans), system-ui, sans-serif;
  font-size: 0.84rem;
  color: #475569;
}
.pf-contact-success {
  border-radius: 0.9rem;
  border: 1px solid rgba(15, 23, 42, 0.1);
  background: #fff;
  padding: 1rem;
}
.pf-contact-success h3 {
  margin: 0 0 0.45rem;
  font-family: "DM Sans", var(--font-sans), system-ui, sans-serif;
  font-size: 1.06rem;
  color: #0f172a;
}
.pf-contact-success p {
  margin: 0;
  font-family: "DM Sans", var(--font-sans), system-ui, sans-serif;
  color: #475569;
  line-height: 1.6;
}
@media (prefers-reduced-motion: no-preference) {
  .pf-contact-step__body {
    animation: pf-contact-step-in 180ms ease;
  }
  @keyframes pf-contact-step-in {
    from {
      opacity: 0;
      transform: translateY(8px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
}

/* About + reading — dark surface, subdued art, gold accents (wordmark #c9ae7a) */
.pf-about-main {
  font-family: "DM Sans", system-ui, sans-serif;
  color: #d4d4d4;
  padding: 0  clamp(1.1rem, 4vw, 2.25rem) 3rem;
}
.pf-about {
  max-width: 38rem;
  margin: 0 auto;
}
.pf-about__eyebrow {
  font-size: 0.68rem;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: #a1a1aa;
  margin-bottom: 0.65rem;
}
.pf-about__title {
  font-family: "Instrument Serif", Georgia, serif;
  font-size: clamp(2rem, 4vw, 2.85rem);
  font-weight: 400;
  line-height: 1.12;
  margin: 0 0 1.25rem;
  color: #fafafa;
}
.pf-about__title-accent {
  font-style: italic;
  color: #c9ae7a;
  text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35), 0 0 20px rgba(201, 174, 122, 0.2);
}
.pf-about__lead {
  font-size: 1.05rem;
  line-height: 1.75;
  color: #e5e5e5;
  font-weight: 500;
  margin: 0 0 1rem;
}
.pf-about__p {
  font-size: 0.98rem;
  line-height: 1.72;
  color: #c4c4c4;
  font-weight: 500;
  margin: 0 0 1rem;
}
.pf-about__p strong { color: #fafafa; font-weight: 600; }
.pf-about__inline-link {
  display: inline;
  color: #c9ae7a;
  text-decoration: none;
  border: none;
  border-bottom: 1px solid rgba(201, 174, 122, 0.55);
  border-radius: 0;
  padding: 0 0 1px;
  cursor: pointer;
  background: none;
  font: inherit;
  vertical-align: baseline;
  font-weight: 500;
}
.pf-about__inline-link:hover {
  color: #dcc9a0;
  border-bottom-color: rgba(220, 201, 160, 0.85);
}

.pf-work {
  max-width: 42rem;
  margin: 0 auto;
}
.pf-work__cases {
  display: flex;
  flex-direction: column;
  gap: 1.35rem;
  margin: 0;
  padding: 0;
  list-style: none;
}
.pf-work-case {
  border: 1px solid rgba(115, 115, 115, 0.38);
  border-radius: 0.65rem;
  padding: 1.2rem 1.3rem 1.35rem;
  background: rgba(15, 23, 42, 0.55);
  box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
}
.pf-work-case__meta {
  font-size: 0.68rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #a1a1aa;
  margin: 0 0 0.5rem;
}
.pf-work-case__title {
  font-family: "Instrument Serif", Georgia, serif;
  font-size: 1.35rem;
  font-weight: 400;
  line-height: 1.2;
  color: #fafafa;
  margin: 0 0 0.65rem;
}
.pf-work-case__body {
  font-size: 0.92rem;
  line-height: 1.72;
  color: #c4c4c4;
  margin: 0 0 1rem;
  font-weight: 500;
}
.pf-work-case__quote {
  margin: 0;
  padding: 0.75rem 0 0.35rem 1rem;
  border-left: 2px solid rgba(201, 174, 122, 0.55);
  font-family: "Instrument Serif", Georgia, serif;
  font-size: 1.05rem;
  font-style: italic;
  line-height: 1.55;
  color: #e8e8e8;
}
.pf-work-case__cite {
  display: block;
  margin-top: 0.65rem;
  font-family: "DM Sans", system-ui, sans-serif;
  font-size: 0.78rem;
  font-style: normal;
  letter-spacing: 0.02em;
  color: #a3a3a3;
  line-height: 1.5;
}

.pf-connect {
  margin-top: 2rem;
  padding-top: 1.75rem;
  border-top: 1px solid rgba(115, 115, 115, 0.35);
}
.pf-connect__label {
  font-size: 0.68rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #a1a1aa;
  margin: 0 0 0.9rem;
}
.pf-connect__list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
  flex-wrap: wrap;
  gap: 0.55rem;
}
.pf-connect__a {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 2.5rem;
  height: 2.5rem;
  padding: 0.35rem;
  border-radius: 999px;
  border: 1px solid rgba(201, 174, 122, 0.35);
  background: rgba(15, 23, 42, 0.72);
  text-decoration: none;
  transition: border-color 0.15s ease, background 0.15s ease, transform 0.15s ease;
}
.pf-connect__a:hover {
  border-color: rgba(201, 174, 122, 0.75);
  background: rgba(30, 41, 59, 0.92);
  transform: translateY(-1px);
}
.pf-connect__a:focus-visible {
  outline: 2px solid #c9ae7a;
  outline-offset: 3px;
}
.pf-connect__icon {
  width: 1.2rem;
  height: 1.2rem;
  display: block;
}
.pf-section-footer-nav {
  margin: 2.25rem auto 0;
  padding-top: 1rem;
  border-top: 1px solid rgba(115, 115, 115, 0.35);
  display: flex;
  flex-wrap: wrap;
  gap: 0.65rem;
}
.pf-section-footer-nav--contained {
  width: min(1100px, 92%);
}
.pf-section-footer-btn {
  border: 1px solid rgba(201, 174, 122, 0.35);
  background: rgba(15, 23, 42, 0.72);
  color: #e5e5e5;
  border-radius: 999px;
  padding: 0.5rem 0.95rem;
  font-size: 0.82rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 500;
  cursor: pointer;
  transition: border-color 0.15s ease, background 0.15s ease, color 0.15s ease;
}
.pf-section-footer-btn:hover {
  border-color: rgba(201, 174, 122, 0.75);
  background: rgba(30, 41, 59, 0.92);
  color: #fafafa;
}
.pf-section-footer-btn:focus-visible {
  outline: 2px solid #c9ae7a;
  outline-offset: 3px;
}
.pf-reading {
  max-width: 68rem;
  margin: 0 auto;
  padding: 2.5rem clamp(1.1rem, 4vw, 2.25rem) 2rem;
  display: grid;
  grid-template-columns: minmax(0, 1.2fr) auto;
  grid-template-rows: auto auto;
  gap: 1.25rem 2rem;
  align-items: start;
  border-top: 1px solid rgba(51, 65, 85, 0.65);
}
.pf-reading__quote-block { grid-column: 1; grid-row: 1 / span 2; }

<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// Globe position in hero art (848×1264 viewBox — act-1.svg)
const GCY = 0.2095; // globe center Y fraction of container height
const GR  = 0.2095; // globe radius fraction of container height

// ── Four section tiles after crack (same site; Work = template / design routes for leads)
const CARDS = [
  { id: 'services', label: 'Services', sub: 'Click to learn more' },
  { id: 'work',     label: 'Work',     sub: 'Click to learn more' },
  { id: 'about',    label: 'About',    sub: 'Click to learn more' },
  { id: 'contact',  label: 'Contact',  sub: 'Click to learn more' },

// fluid-particle.tsx — Canvas + JS only (no Tailwind for the effect). Ported from TS; fixed DPR transform + listener cleanup.
function FluidParticles({
  particleDensity = 100,
  particleSize = 1,
  particleColor = '#555555',
  activeColor = '#ffffff',
  maxBlastRadius = 300,
  hoverDelay = 100,
  interactionDistance = 10,
}) {
  const canvasRef = useRef(null);
  const ctxRef = useRef(null);
  const particlesRef = useRef([]);
  const mouseRef = useRef({ x: 0, y: 0, prevX: 0, prevY: 0 });
  const blastRef = useRef({ active: false, x: 0, y: 0, radius: 0, maxRadius: maxBlastRadius });
  const animationRef = useRef(0);
  const hoverTimerRef = useRef(null);
  const lastMoveRef = useRef(0);
  const optsRef = useRef({ particleDensity, particleSize, particleColor, activeColor, maxBlastRadius, hoverDelay, interactionDistance });
  optsRef.current = { particleDensity, particleSize, particleColor, activeColor, maxBlastRadius, hoverDelay, interactionDistance };

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return undefined;

    const o = () => optsRef.current;
    let ctx = canvas.getContext('2d', { alpha: true });
    ctxRef.current = ctx;
    if (ctx) ctx.globalCompositeOperation = 'lighter';

    function easeOutQuad(t) { return t * (2 - t); }

    class Particle {
      constructor(x, y) {
        const { particleSize: ps, particleColor: pc } = o();
        this.x = x; this.y = y; this.baseX = x; this.baseY = y;
        this.size = Math.random() * ps + 0.5;
        this.density = Math.random() * 3 + 1;
        this.color = pc;
        this.vx = 0; this.vy = 0;
        this.friction = 0.9 - 0.01 * this.density;
      }
      draw() {
        if (!ctx) return;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
      update() {
        if (!ctx) return;
        const { activeColor: ac, particleColor: pc, interactionDistance: idist } = o();
        this.x += this.vx; this.y += this.vy;
        this.vx *= this.friction; this.vy *= this.friction;

        const m = mouseRef.current;
        const dx = m.x - this.x, dy = m.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < idist && dist > 0) {
          const fx = dx / dist, fy = dy / dist;
          const force = (idist - dist) / idist;
          this.x -= fx * force * this.density * 0.6;
          this.y -= fy * force * this.density * 0.6;
          this.color = ac;
        } else {
          if (this.x !== this.baseX) this.x -= (this.x - this.baseX) / 20;
          if (this.y !== this.baseY) this.y -= (this.y - this.baseY) / 20;
          this.color = pc;
        }

        const b = blastRef.current;
        if (b.active) {
          const bx = this.x - b.x, by = this.y - b.y;
          const bd = Math.sqrt(bx * bx + by * by);
          if (bd < b.radius && bd > 0) {
            const nx = bx / bd, ny = by / bd;
            const bf = (b.radius - bd) / b.radius;
            this.vx += nx * bf * 15;
            this.vy += ny * bf * 15;
            const intensity = Math.min(255, Math.floor(255 - bd));
            this.color = `rgba(${intensity}, 100, 255, 0.8)`;
          }
        }
        this.draw();
      }
    }

    function initParticles() {
      const { particleDensity: pd } = o();
      const w = window.innerWidth, h = window.innerHeight;
      const n = Math.floor((w * h) / pd);
      particlesRef.current = [];
      for (let i = 0; i < n; i++) {
        particlesRef.current.push(new Particle(Math.random() * w, Math.random() * h));
      }
    }

    function triggerBlast(x, y) {
      const { maxBlastRadius: mr } = o();
      blastRef.current = { active: true, x, y, radius: 0, maxRadius: mr };
      const start = performance.now();
      const duration = 300;
      function expandBlast(ts) {
        const elapsed = ts - start;
        const progress = Math.min(elapsed / duration, 1);
        blastRef.current.radius = easeOutQuad(progress) * blastRef.current.maxRadius;
        if (progress < 1) requestAnimationFrame(expandBlast);
        else setTimeout(() => { blastRef.current.active = false; }, 100);
      }
      requestAnimationFrame(expandBlast);
      if (hoverTimerRef.current) {
        clearTimeout(hoverTimerRef.current);
        hoverTimerRef.current = null;
      }
    }

    function handleResize() {
      const dpr = window.devicePixelRatio || 1;
      const w = window.innerWidth, h = window.innerHeight;
      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = `${w}px`;
      canvas.style.height = `${h}px`;
      ctx = canvas.getContext('2d', { alpha: true });
      ctxRef.current = ctx;
      if (ctx) {
        ctx.globalCompositeOperation = 'lighter';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      initParticles();
    }

    function animate() {
      const c = ctxRef.current;
      if (!c) return;
      const w = window.innerWidth, h = window.innerHeight;
      c.clearRect(0, 0, w, h);
      particlesRef.current.forEach((p) => p.update());
      animationRef.current = requestAnimationFrame(animate);
    }

    const moveThrottle = 10;
    function onMouseMove(e) {
      const now = performance.now();
      if (now - lastMoveRef.current < moveThrottle) return;
      lastMoveRef.current = now;
      const m = mouseRef.current;
      const prevX = m.x, prevY = m.y;
      mouseRef.current = { x: e.clientX, y: e.clientY, prevX, prevY };
      const dx = mouseRef.current.x - mouseRef.current.prevX;
      const dy = mouseRef.current.y - mouseRef.current.prevY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const { hoverDelay: hd } = o();
      if (dist < 5) {
        if (hoverTimerRef.current === null) {
          hoverTimerRef.current = setTimeout(() => {
            triggerBlast(e.clientX, e.clientY);
          }, hd);
        }
      } else if (hoverTimerRef.current) {
        clearTimeout(hoverTimerRef.current);
        hoverTimerRef.current = null;
      }
    }

    function onTouchMove(e) {
      if (e.touches.length > 1 && e.touches[0]) {
        const m = mouseRef.current;
        const prevX = m.x, prevY = m.y;
        mouseRef.current = {
          x: e.touches[0].clientX,
          y: e.touches[0].clientY,
          prevX, prevY,
        };
      }
    }

    function onTouchStart(e) {
      const { hoverDelay: hd } = o();
      if (e.touches.length > 1 && e.touches[0]) {
        const x = e.touches[0].clientX, y = e.touches[0].clientY;
        hoverTimerRef.current = setTimeout(() => triggerBlast(x, y), hd);
      }
    }

    function onTouchEnd() {
      if (hoverTimerRef.current) {
        clearTimeout(hoverTimerRef.current);
        hoverTimerRef.current = null;
      }
    }

    function onClick(e) {
      triggerBlast(e.clientX, e.clientY);
    }

    handleResize();
    window.addEventListener('resize', handleResize);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('touchmove', onTouchMove, { passive: true });
    window.addEventListener('touchstart', onTouchStart, { passive: true });
    window.addEventListener('touchend', onTouchEnd);
    window.addEventListener('click', onClick);
    animationRef.current = requestAnimationFrame(animate);

    return () => {
      window.removeEventListener('resize', handleResize);
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('touchmove', onTouchMove);
      window.removeEventListener('touchstart', onTouchStart);
      window.removeEventListener('touchend', onTouchEnd);
      window.removeEventListener('click', onClick);
      if (hoverTimerRef.current) clearTimeout(hoverTimerRef.current);
      cancelAnimationFrame(animationRef.current);
    };
  }, []);

  return (
    <div style={{ position: 'fixed', inset: 0, zIndex: 0, pointerEvents: 'none' }}>
      <canvas ref={canvasRef} style={{ position: 'absolute', inset: 0, display: 'block' }} />
    </div>
  );
}

          Next Section →
        </button>

  );
}

function AboutSection({ onNavigate }) {
  return (
    <div
      data-theme="dark"
      className="about-embed-root"
      style={{
        minHeight: '100%',
        background: 'transparent',
        color: '#d4d4d4',
      }}
    >
      <main className="pf-about-main" style={{ paddingTop: '1rem' }}>
        <div id="about" className="pf-about">
          <p className="pf-about__eyebrow">About</p>
          <h1 className="pf-about__title">
            Hey, I&apos;m <span className="pf-about__title-accent">David Walker</span>.
          </h1>

          <p className="pf-about__lead">
            I run <strong>Networks &amp; Nodes</strong>, a small studio practice where
            I build fast, understated websites for <strong>artists, photographers,
            and small businesses</strong>—and the infrastructure that keeps them
            quietly reliable behind the scenes. My day job is network and systems
            engineering, and the same habits that keep backends boringly dependable
            are the ones I bring to the work I do for people who think in pictures,
            not in roadmaps.
          </p>
          <p className="pf-about__p">
            The two sides of this practice share the same habits. A decade of designing networks, cloud systems,
            and internal tools taught me that the invisible work - the naming conventions, the fallback plans, the
            quiet logging - is what makes the visible work possible. I carry that habit to the public side:
            responsive layouts, type that reads well on a phone, and inquiry flows that feel respectful instead of
            pushy. Heavy technical background, human-facing outcome.
          </p>
          <p className="pf-about__p">
            The same instincts that keep backends boringly reliable—fewer moving parts, honest tradeoffs, attention
            to performance—are the ones I use when I tune how your portfolio loads and how captions breathe next to
            full-bleed work. Heavy technical background, human-facing outcome: a calm site that still feels like
            yours.
          </p>
          <p className="pf-about__p">
            Off the clock I still like working with my hands—board-level repair, KiCad, the occasional hardware
            rabbit hole. It keeps me patient with detail, whether that&apos;s a trace on a board or spacing in a
            layout grid.
          </p>
          <p className="pf-about__p">
            The name <strong>Networks &amp; Nodes</strong> comes from the day job.
            In network engineering, a node is any device with a name and an address
            on a network; the network is what connects them and lets them do anything
            useful together. That felt like a fair description of the websites I build

          </p>

            <button
              type="button"
              className="pf-about__inline-link"
              onClick={() => onNavigate('contact')}

              Get in touch

            {' '}if you&apos;d like to talk about your next site, timelines, or how you want your work to move on the
            page.
          </p>

      const response = await fetch(form.action, {

        body: JSON.stringify(payload),
      });
      if (!response.ok) {
        throw new Error('Submission failed');
      }
      setIsSubmitted(true);

      setSubmitError('Something went wrong sending your note. Please try again or email directly.');

  };
  const [isMobile, setIsMobile] = useState(() => {
    if (typeof window === 'undefined') return false;
    return window.innerWidth < 760;
  });
  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth < 760);
    onResize();
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);
  useEffect(() => {
    if (!visible) return;
    const el = panelBodyRef.current;
    if (el) el.scrollTop = 0;
  }, [visible]);
  const backBtn = {
    background: 'none', border: '1px solid rgba(201, 174, 122, 0.45)',
    color: 'rgba(201, 174, 122, 0.92)', padding: isMobile ? '7px 12px' : '7px 16px', borderRadius: 2,
    fontSize: isMobile ? 10 : 11, letterSpacing: isMobile ? '0.16em' : '0.22em', textTransform: 'uppercase',
    fontFamily: F, cursor: 'pointer',
  };
  const tabBase = {
    background: 'none', border: 'none', borderBottom: '2px solid transparent',
    color: 'rgba(201, 174, 122, 0.58)', padding: isMobile ? '7px 9px' : '8px 12px', cursor: 'pointer',
    fontSize: isMobile ? 11 : 12, letterSpacing: isMobile ? '0.12em' : '0.18em', textTransform: 'uppercase', fontFamily: F,
    transition: 'color 0.15s ease, border-color 0.15s ease',
    flex: isMobile ? '0 0 auto' : undefined,
  };
  return (
    <div style={{
      position: 'absolute', inset: 0, zIndex: 20,
      display: 'flex', flexDirection: 'column',
      opacity: visible ? 1 : 0,
      pointerEvents: visible ? 'auto' : 'none',
      transition: 'opacity 1s ease',
      background: '#0b1220',
      minHeight: 0,
    }}>
      <header style={{
        padding: isMobile ? '12px 14px' : '18px 28px',
        display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: '16px 24px',
        borderBottom: '1px solid rgba(148,163,184,0.18)', rowGap: 14,
        background: '#070d18',
      }}>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 4, width: isMobile ? '100%' : 'auto' }}>
          <button
            type="button"
            onClick={() => chooseSection(null)}
            style={{
              background: 'none', border: 'none', padding: 0, cursor: 'pointer',
              color: '#c9ae7a',
              textShadow: '0 1px 2px rgba(0,0,0,0.55), 0 0 18px rgba(74, 58, 32, 0.25)',
              fontSize: isMobile ? 11 : 12, letterSpacing: isMobile ? '0.16em' : '0.28em', textTransform: 'uppercase',
              fontFamily: F, textAlign: 'left',
            }}
          >Networks &amp; Nodes</button>
          <span style={{
            color: '#9d8658', fontSize: isMobile ? 11 : 12, letterSpacing: '0.04em', fontFamily: F, fontStyle: 'italic',
          }}>Everybody here?</span>
        </div>

        <nav
          style={{
            flex: isMobile ? '1 1 100%' : '1 1 200px', display: 'flex', flexWrap: isMobile ? 'nowrap' : 'wrap', justifyContent: isMobile ? 'flex-start' : 'center',
            alignItems: 'center', gap: 4, minWidth: 0, overflowX: isMobile ? 'auto' : 'visible',
            scrollbarWidth: isMobile ? 'none' : 'auto', paddingBottom: isMobile ? 2 : 0,
          }}
          aria-label="Sections"
        >
          {CARDS.map(card => (
            <button
              key={card.id}
              type="button"
              onClick={() => chooseSection(card.id)}
              title={card.sub}
              style={{
                ...tabBase,
                color: active === card.id ? '#f0dfc4' : tabBase.color,
                borderBottomColor: active === card.id ? '#f87171' : 'transparent',
                fontWeight: active === card.id ? 500 : 400,
              }}
            >{card.label}</button>
          ))}
        </nav>

        <div style={{ display: 'flex', alignItems: 'center', justifyContent: isMobile ? 'space-between' : 'flex-start', gap: 10, marginLeft: isMobile ? 0 : 'auto', width: isMobile ? '100%' : 'auto' }}>
          {active !== null && (
            <button
              type="button"
              onClick={goBackToGrid}
              style={{
                background: 'none', border: 'none', color: 'rgba(201, 174, 122, 0.88)',
                padding: '6px 4px', cursor: 'pointer', fontFamily: F, fontSize: isMobile ? 11 : 12,
                letterSpacing: isMobile ? '0.08em' : '0.12em', textTransform: 'uppercase',
              }}
            >← Sections</button>
          )}
          <button
            type="button"
            onClick={() => chooseSection(null)}
            style={backBtn}
            onMouseOver={e => { e.currentTarget.style.borderColor = 'rgba(232, 208, 160, 0.65)'; }}
            onMouseOut={e => { e.currentTarget.style.borderColor = 'rgba(201, 174, 122, 0.45)'; }}
          >{isMobile ? 'Back to intro' : '↑ Back'}</button>
        </div>
      </header>

      <div
        ref={panelBodyRef}
        className={[
          'portfolio-panel-body',
          active === null && 'portfolio-panel-body--grid',
          active === 'about' && 'portfolio-panel-body--about',
          active === 'work' && 'portfolio-panel-body--work',
          active === 'services' && 'portfolio-panel-body--services',
          active === 'contact' && 'portfolio-panel-body--contact',
        ].filter(Boolean).join(' ')}
      >
        {active === null ? (
          <div style={{
            flex: 1, display: 'grid',
            gridTemplateColumns: '1fr 1fr',
            gridTemplateRows: '1fr 1fr',
            minHeight: 0,
          }}>
            {CARDS.map((card, i) => (
              <button
                key={card.id}
                type="button"
                className={`pf-nav-grid-tile pf-nav-grid-tile--${card.id}`}
                onClick={() => chooseSection(card.id)}
                style={{
                  border: 'none',
                  borderRight: i % 2 === 0 ? '1px solid rgba(255,255,255,0.08)' : 'none',
                  borderBottom: i < 2 ? '1px solid rgba(255,255,255,0.08)' : 'none',
                  cursor: 'pointer', padding: 0,
                  display: 'flex', flexDirection: 'column',
                  alignItems: 'center', justifyContent: 'center', gap: 12,
                  position: 'relative', overflow: 'hidden',
                }}
              >
                <span
                  className="pf-nav-grid-tile__num"
                  style={{
                    fontSize: 'clamp(64px,8.5vw,128px)',
                    fontFamily: F, fontWeight: 200, letterSpacing: '-0.04em',
                    position: 'absolute', top: '50%', left: '50%',
                    transform: 'translate(-50%,-50%)',
                    userSelect: 'none', pointerEvents: 'none',
                    lineHeight: 1,
                  }}
                >{String(i + 1).padStart(2, '0')}</span>
                <h2 className="pf-nav-grid-tile__title" style={{ fontFamily: F, position: 'relative' }}>{card.label}</h2>
                <p className="pf-nav-grid-tile__sub" style={{ fontFamily: F, position: 'relative' }}>{card.sub}</p>
              </button>
            ))}
          </div>
        ) : active === 'about' ? (
          <AboutSection onNavigate={(id) => { scrollPanelTop(); onSelect(id); }} />
        ) : active === 'work' ? (
          <WorkSection onNavigate={(id) => { scrollPanelTop(); onSelect(id); }} />
        ) : active === 'services' ? (
          <ServicesSection onNavigate={(id) => { scrollPanelTop(); onSelect(id); }} />
        ) : active === 'contact' ? (
          <ContactSection onNavigate={(id) => { scrollPanelTop(); onSelect(id); }} />
        ) : null}
      </div>
    </div>
  );
}

// ── App
function App() {
  const [progress, setProgress] = useState(0);
  const [phase, setPhase]       = useState('zoom'); // 'zoom' | 'content'
  const [active, setActive]     = useState(null);
  const [sz, setSz]             = useState({ w: 0, h: 0 });

  const pRef   = useRef(0);
  const tRef   = useRef(0);
  const phRef  = useRef('zoom');
  const rafRef = useRef(null);
  const heroRef = useRef(null);
  const touchYRef = useRef(null);
  const touchStartYRef = useRef(null);
  const lastSplashInteractRef = useRef(Date.now());
  const idleAutoRef = useRef(false);

  useEffect(() => { phRef.current = phase; }, [phase]);

  // Container size
  useEffect(() => {
    const upd = () => setSz({ w: window.innerHeight * (848/1264), h: window.innerHeight });
    upd();
    window.addEventListener('resize', upd);
    return () => window.removeEventListener('resize', upd);
  }, []);

  // Lerp loop
  useEffect(() => {
    const tick = () => {
      const cur  = pRef.current;
      const alpha = idleAutoRef.current ? 0.014 : 0.050;
      const next = cur + (tRef.current - cur) * alpha;
      if (Math.abs(next - cur) > 0.00004) {
        pRef.current = next;
        setProgress(next);
        if (next > 0.960 && phRef.current === 'zoom') {
          idleAutoRef.current = false;
          setPhase('content');
          setActive(null);
        }
      }
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(rafRef.current);
  }, []);

  // After 4s idle on splash, slowly auto-advance zoom then open the four-tile grid
  useEffect(() => {
    if (phase !== 'zoom') return undefined;
    const tick = () => {
      if (phRef.current !== 'zoom') return;
      if (idleAutoRef.current) return;
      if (Date.now() - lastSplashInteractRef.current < 4000) return;
      idleAutoRef.current = true;
      tRef.current = 1;
    };
    const id = setInterval(tick, 400);
    return () => clearInterval(id);
  }, [phase]);

  // Scroll / keys
  useEffect(() => {
    const clampProgress = value => Math.max(0, Math.min(1, value));
    const bumpSplash = () => {
      lastSplashInteractRef.current = Date.now();
      idleAutoRef.current = false;
    };
    const onWheel = e => {
      if (phRef.current === 'content') return;
      bumpSplash();
      e.preventDefault();
      tRef.current = clampProgress(tRef.current + e.deltaY / 1800);
    };
    const onKey = e => {
      if (phRef.current === 'content') return;
      bumpSplash();
      if (e.key === 'ArrowDown' || e.key === 'PageDown') tRef.current = clampProgress(tRef.current + 0.06);
      if (e.key === 'ArrowUp'   || e.key === 'PageUp')   tRef.current = clampProgress(tRef.current - 0.06);
    };
    const onTouchStart = e => {
      if (phRef.current === 'content') return;
      bumpSplash();
      if (e.touches.length === 1 && e.touches[0]) {
        const y = e.touches[0].clientY;
        touchYRef.current = y;
        touchStartYRef.current = y;
      }
    };
    const onTouchMove = e => {
      if (phRef.current === 'content') return;
      bumpSplash();
      if (!e.touches[0] || touchYRef.current === null) return;
      const nextY = e.touches[0].clientY;
      const deltaY = touchYRef.current - nextY;
      touchYRef.current = nextY;
      if (Math.abs(deltaY) < 0.5) return;
      tRef.current = clampProgress(tRef.current + deltaY / 900);
    };
    const onTouchEnd = () => {
      bumpSplash();
      if (phRef.current !== 'content' && touchStartYRef.current !== null && touchYRef.current !== null) {
        const swipeDistance = touchStartYRef.current - touchYRef.current;
        if (swipeDistance > 40) tRef.current = clampProgress(tRef.current + Math.min(0.35, swipeDistance / 360));
      }
      touchYRef.current = null;
      touchStartYRef.current = null;
    };

    window.addEventListener('wheel', onWheel, { passive: false });
    window.addEventListener('keydown', onKey);
    const heroEl = heroRef.current;
    if (heroEl) {
      heroEl.addEventListener('touchstart', onTouchStart, { passive: true });
      heroEl.addEventListener('touchmove', onTouchMove, { passive: true });
      heroEl.addEventListener('touchend', onTouchEnd);
      heroEl.addEventListener('touchcancel', onTouchEnd);
    }
    return () => {
      window.removeEventListener('wheel', onWheel);
      window.removeEventListener('keydown', onKey);
      if (heroEl) {
        heroEl.removeEventListener('touchstart', onTouchStart);
        heroEl.removeEventListener('touchmove', onTouchMove);
        heroEl.removeEventListener('touchend', onTouchEnd);
        heroEl.removeEventListener('touchcancel', onTouchEnd);
      }
    };
  }, []);

  function handleBack() {
    setPhase('zoom');
    setActive(null);
    tRef.current = 0;
    idleAutoRef.current = false;
    lastSplashInteractRef.current = Date.now();
  }

  const { w: cW, h: cH } = sz;
  // Crack reveal: starts after a short scroll, ramps so cracks read on the globe through mid-zoom
  const crackScroll = progress < 0.045 ? 0 : Math.min(1, (progress - 0.045) / 0.58);

  // Max scale to fill viewport from globe center
  const vW = window.innerWidth, vH = window.innerHeight;
  const globeR = cH * GR;
  const globeVX = vW / 2, globeVY = cH * GCY;
  const corners = [[0,0],[vW,0],[0,vH],[vW,vH]];
  const maxDist = Math.max(...corners.map(([x,y]) => Math.sqrt((x-globeVX)**2+(y-globeVY)**2)));
  const maxScale = globeR > 0 ? (maxDist / globeR) * 1.18 : 6;
  const scale = 1 + Math.pow(progress, 0.58) * (maxScale - 1);
  const tx = window.innerWidth / 2 - (cW / 2) * scale;
  const ty = cH * GCY * (1 - scale);

  // Crack overlay: circle expands from globe center as crackScroll increases (globe-only reveal)
  const clipR = crackScroll * globeR * 1.08;
  const clipCX = cW / 2;
  const clipCY = cH * GCY;
  const crackOpacity = Math.min(1, Math.pow(crackScroll, 0.85) * 1.15);

  const F = 'Inter, Helvetica Neue, sans-serif';

  return (
    <>
      <FluidParticles
        particleDensity={100}
        particleSize={1}
        particleColor="#555555"
        activeColor="#f1f5f9"
        maxBlastRadius={300}
        hoverDelay={100}
        interactionDistance={100}
      />
      <div ref={heroRef} className="hero-shell">

      {/* ── Zoom container ── */}
      {cW > 0 && (
        <div className="hero-zoom-layer" style={{
          width: cW, height: cH,
          transform: `translate(${tx}px, ${ty}px) scale(${scale})`,
          opacity: phase === 'content' ? 0 : 1,
          transition: phase === 'content' ? 'opacity 0.6s ease' : 'none',
          ['--hero-globe-cy-pct']: `${GCY * 100}%`,
        }}>
          {/* act-1.svg: vector B&W art, transparent outside paths */}
          <img src="test-pages-new/act-1.svg" alt="" draggable={false} className="hero-art-img" />

          {/* cracked-globe: lighten so dark lines read on black act-1 globe; clip + opacity follow scroll */}
          {crackScroll > 0.001 && (
            <img src="test-pages-new/cracked-globe.svg" alt="" draggable={false} style={{
              position: 'absolute', top: 0, left: 0,
              width: '100%', height: '100%',
              objectFit: 'fill',
              mixBlendMode: 'lighten',
              opacity: crackOpacity,
              clipPath: `circle(${Math.max(0.5, clipR)}px at ${clipCX}px ${clipCY}px)`,
              pointerEvents: 'none',
            }} />
          )}

          <div
            className="hero-scroll-hint hero-scroll-hint--in-globe"
            style={{
              opacity: Math.max(0, 1 - progress * 8),
              fontFamily: F,
            }}
          >
            Swipe up to continue.
          </div>
        </div>
      )}

      {/* ── Brand wordmark ──
          Two-line treatment. The primary wordmark stays large and centered;
          a smaller secondary line identifies the principal.
          Both lines share the same opacity transition tied to scroll progress,
          so they fade out together as the globe zooms in. */}
      <div className="hero-wordmark" style={{
        opacity: Math.max(0, 1 - progress * 5),
        fontFamily: F,
      }}>
        <div className="hero-wordmark__primary">Networks &amp; Nodes</div>
        <div className="hero-wordmark__secondary">a studio practice by David Walker</div>
      </div>

      {/* ── Crack % ── */}
      {crackScroll > 0.02 && phase === 'zoom' && (
        <div className="hero-crack-progress" style={{
          opacity: Math.min(1, crackScroll * 5) * Math.max(0, 1 - (progress - 0.88) * 8),
        }}>{Math.round(crackScroll * 100)}%</div>
      )}

      {/* ── Nav cards ── */}
      <NavCards
        visible={phase === 'content'}
        onSelect={id => (id ? setActive(id) : handleBack())}
        onBackToGrid={() => setActive(null)}
        active={active}
      />
    </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
